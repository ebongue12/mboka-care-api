<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mboka Care — Portail Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%); min-height: 100vh; }
    .login-card { border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .logo-circle { width: 80px; height: 80px; background: #1565C0; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
    .btn-login { background: #1565C0; border: none; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 12px; }
    .btn-login:hover { background: #0D47A1; }
    .form-control { padding: 12px 16px; border-radius: 12px; border: 1px solid #E0E0E0; font-size: 15px; }
    .form-control:focus { border-color: #1565C0; box-shadow: 0 0 0 3px rgba(21,101,192,0.15); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="container" style="max-width: 420px;">
    <div class="card login-card border-0 p-4">
      <div class="text-center mb-4 mt-2">
        <div class="logo-circle mb-3">
          <i class="fas fa-heart-pulse fa-2x text-white"></i>
        </div>
        <h4 class="fw-bold mb-1">Mboka Care</h4>
        <p class="text-muted mb-0">Portail Administration</p>
      </div>

      {% if error %}
      <div class="alert alert-danger rounded-3 py-2 px-3 mb-3" style="font-size:14px;">
        <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold text-muted small">NUMÉRO DE TÉLÉPHONE</label>
          <div class="input-group">
            <span class="input-group-text rounded-start-3" style="border-radius:12px 0 0 12px;"><i class="fas fa-phone text-muted"></i></span>
            <input type="text" name="phone" class="form-control border-start-0" placeholder="+237 6XX XXX XXX" required style="border-radius:0 12px 12px 0;">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold text-muted small">MOT DE PASSE</label>
          <div class="input-group">
            <span class="input-group-text rounded-start-3" style="border-radius:12px 0 0 12px;"><i class="fas fa-lock text-muted"></i></span>
            <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required style="border-radius:0 12px 12px 0;">
          </div>
        </div>
        <button type="submit" class="btn btn-login btn-primary w-100 text-white">
          <i class="fas fa-sign-in-alt me-2"></i>Se connecter
        </button>
      </form>

      <p class="text-center text-muted mt-4 mb-2" style="font-size:12px;">
        Accès réservé aux administrateurs Mboka Care
      </p>
    </div>
  </div>
</body>
</html>
